<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWA CPF</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Cor da barra -->
  <meta name="theme-color" content="#0f172a" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 90%;
      max-width: 350px;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 70px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .fatura-card {
      background: #063d8b;
      padding: 25px;
      border-radius: 12px;
      margin: 15px 0 15px 0;
      text-align: left;
    }

    .fatura-card p {
      margin: 5px 0;
    }

    .fatura-card button {
      margin-top: 8px;
      
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <h1>Consultar Faturas</h1>

    <input 
      type="text" 
      id="cpf"
      placeholder="Digite seu CPF"
      maxlength="14"
    />

    <button onclick="enviarCPF()">
      Acessar
    </button>


    <div id="resultado" style="display:none; margin-top:30px;">

      <h2 style="margin-bottom:15px;">
        Faturas
      </h2>

      <div id="listaFaturas"></div>

    </div>

  </div>

  <script>
    // Máscara CPF
    const cpfInput = document.getElementById('cpf');

    cpfInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');

      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      e.target.value = value;
    });

    async function enviarCPF() {
      const cpf = cpfInput.value;

      if (!cpf || cpf.length < 14) {
        alert('Digite um CPF válido');
        return;
      }


      try{

        const response = await fetch( `https://isp-hub-api-production-cfe2.up.railway.app/api/ixc/faturas/${cpf}`);
        const dados = await response.json();
        console.log(dados)

        if (!dados.registros || !dados.registros.length) {
            alert('Nenhuma fatura encontrada');
            return;
          }

        const lista = document.getElementById('listaFaturas');

          lista.innerHTML = '';

          dados.registros.forEach((fatura, index) => {

            const card = document.createElement('div');

            card.className = 'fatura-card';

            card.innerHTML = `
              <p>
                <strong>Valor:</strong>
                ${Number(fatura.valor).toLocaleString(
                  'pt-BR',
                  {
                    style: 'currency',
                    currency: 'BRL'
                  }
                )}
              </p>

              <p>
                <strong>Vencimento:</strong>
                ${new Date(
                  fatura.data_vencimento
                ).toLocaleDateString('pt-BR')}
              </p>

              <p>
                <strong>Status:</strong>
                ${fatura.status === 'A' ? 'Aberta' : fatura.status}
              </p>

              <button onclick="copiarLinha(${index})">
                Copiar Código
              </button>

              <button onclick="abrirBoleto(${index})">
                Abrir Boleto
              </button>
            `;

            lista.appendChild(card);
          });

          window.faturas = dados.registros;

          document.getElementById('resultado').style.display = 'block';
                          
          console.log('Quantidade:', dados.registros.length);
      }catch{

      }
      
    }

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('PWA ativo'));
    }

    function copiarLinha(index) {

      navigator.clipboard.writeText(
        window.faturas[index].linha_digitavel
      );

      alert('Código copiado!');
    }

  function abrirBoleto(index) {
    window.open(
      window.faturas[index].gateway_link,
      '_blank'
    );
  }
  </script>

</body>
</html>
