<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PWA CPF</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Cor da barra -->
  <meta name="theme-color" content="#0f172a" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: white;
      padding: 20px 0;
    }

    .container {
      width: 90%;
      max-width: 450px;
      background: #1e293b;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 70px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .cliente-card,
    .fatura-card {
      background: #063d8b;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
      text-align: left;
    }

    .fatura-card {
      background: #063d8b;
      padding: 25px;
      border-radius: 12px;
      margin: 15px 0 15px 0;
      text-align: left;
    }

    .fatura-card p {
      margin: 5px 0;
    }

    .fatura-card button {
      margin-top: 8px;
      
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="Logo">
    </div>

    <h1>Consultar Faturas</h1>

    <input 
      type="text" 
      id="cpf"
      placeholder="Digite seu CPF"
      maxlength="14"
    />

    <button onclick="obterCliente()">
      Acessar
    </button>


    <div id="resultado" style="display:none; margin-top:30px;">

      <h2 style="margin-bottom:15px;">
        Minhas Faturas
      </h2>

      <div id="cliente"></div>
      
      <div id="listaFaturas"></div>

    </div>

  </div>

  <script>
    // Máscara CPF
    const cpfInput = document.getElementById('cpf');

    cpfInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');

      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      e.target.value = value;
    });

    async function obterFaturas(idCliente) {

      try {

        const contratosResponse = await fetch(
          `http://localhost:5000/api/ixc/contratos/${idCliente}`
        );

        const lista = document.getElementById('listaFaturas');
        lista.innerHTML = '';

        const contratos = await contratosResponse.json()

        if (!contratos.registros || !contratos.registros.length) {
          alert('Nenhum contrato encontrado');
          return;
        }

        const idContrato = contratos.registros.filter(c => c.status === 'A');
        
        const faturaResponse = await fetch(
          `http://localhost:5000/api/ixc/financeiro/${idContrato[0].id}`
        );

        const faturas = await faturaResponse.json();

        if (!faturas.registros || !faturas.registros.length) {
          alert('Nenhuma fatura encontrada');
          return;
        }

        const faturasEmAberto =
          faturas.registros.filter(
            f => f.status === 'A'
          );

        if (!faturasEmAberto.length) {
          alert('Nenhuma fatura em aberto');
          return;
        }

        window.faturas = faturasEmAberto;

        faturasEmAberto.forEach((fatura, index) => {

          const card = document.createElement('div');

          card.className = 'fatura-card';
          card.innerHTML = '';
          card.innerHTML = `
          <h3 style="margin-botton:10">Fatura referente ao contrato: ${fatura.id_contrato} | Cliente: ${fatura.id_cliente}</h3>
            <p>
              <strong>Valor:</strong>
              ${Number(fatura.valor).toLocaleString(
                'pt-BR',
                {
                  style: 'currency',
                  currency: 'BRL'
                }
              )}
            </p>

            <p>
              <strong>Vencimento:</strong>
              ${new Date(
                fatura.data_vencimento
              ).toLocaleDateString('pt-BR')}
            </p>

            <p>
              <strong>Status:</strong>
              Aberta
            </p>

            <button onclick="copiarLinha(${index})">
              Copiar Código
            </button>

            <button onclick="abrirBoleto(${index})">
              Abrir Boleto
            </button>
          `;

          lista.appendChild(card);

        });

      } catch (error) {

        console.error(error);

        alert('Erro ao consultar faturas');
      }
    }

    async function obterCliente() {

      const cpf = cpfInput.value

      try {

        const response = await fetch(
          `http://localhost:5000/api/ixc/cliente/${cpf}`
        );

        const dados = await response.json();

        const clientes = document.getElementById('cliente');

        clientes.innerHTML = '<h2>CONTRATOS</h2><br><br>';

        if (!dados.registros || !dados.registros.length) {
          alert('Cliente não encontrado');
          return;
        }

        dados.registros.forEach(cliente => {

          const card = document.createElement('div');

          card.className = 'cliente-card';

          card.innerHTML = `
            <p><strong>Cliente: ${cliente.razao}</strong></p>
            <br>
            <p><strong>Código Cliente: ${cliente.id}</strong></p>
            <br>
            <button onclick="obterFaturas(${cliente.id})">
              Ver Faturas
            </button>
          `;

          clientes.appendChild(card);

        });

        document.getElementById('resultado').style.display = 'block';

      } catch (error) {

        console.error(error);

        alert('Erro ao consultar cliente');
      }
    }

    async function obterContratos(idCliente){

      try {
        
        const response = await fetch( `http://localhost:5000/api/ixc/contratos/${idCliente}`);
        const dados = await response.json();   
        console.log(dados)
        const contratos = document.getElementById('contratos'); 
           
         contratos.innerHTML = '';
        
      } catch (error) {
        
      }

    }

    
    function copiarLinha(index) {
      
      navigator.clipboard.writeText(
        window.faturas[index].linha_digitavel
      );

      alert('Código copiado!');
    }

    function abrirBoleto(index) {
    window.open(
      window.faturas[index].gateway_link,
      '_blank'
    );
  }
    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('PWA ativo'));
    }

  </script>

</body>
</html>
